<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bank Test - Fake Service</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffe9e9;
        --panel: #ffffff;
        --text: #4b1111;
        --accent: #d62828;
        --soft: #ffc4c4;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, #fff9f9, transparent 30%),
          linear-gradient(135deg, var(--bg), #ffd3d3);
        color: var(--text);
      }

      main {
        width: min(720px, calc(100% - 32px));
        background: var(--panel);
        border: 3px solid var(--soft);
        border-radius: 24px;
        padding: 40px 32px;
        box-shadow: 0 24px 60px rgba(214, 40, 40, 0.18);
      }

      .badge {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Red Site</div>
      <h1>Imitation Bank Test Portal</h1>
      <p>
        This is the fake endpoint for the lab scenario.
        If you see this red page, traffic is being directed to
        the imitation web server at <strong>172.20.0.60</strong>.
      </p>
    </main>
  </body>
</html>
