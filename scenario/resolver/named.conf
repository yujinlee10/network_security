options {
    directory "/var/cache/bind";
    session-keyfile "/var/cache/bind/session.key";

    listen-on port 53 { any; }; 
    listen-on-v6 { none; };

    // 리졸버가 하나의 질의에 대해 최대 30초까지 기다리도록 설정
    resolver-query-timeout 30;
    
    // 재시도 횟수를 조절하여 포기하지 않게 만듦 (선택 사항)
    max-recursion-queries 20;

    recursion yes;
    allow-query { any; };
    dnssec-validation no;
    //실습을 위한 포트범위 축소
    use-v4-udp-ports { 1025; };

    // Step 1 verification uses public recursive forwarding for stable lookups.
    forwarders {
        8.8.8.8;
        1.1.1.1;
    };
    forward only;
};

zone "bank.test" IN {
    type forward;
    forward only;
    forwarders {
        172.20.0.20;
    };
};
